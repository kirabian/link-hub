<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEKTORA | Link-Hub</title>
    <meta name="description"
        content="Vektora Digital Systems - Digital Systems & Software Engineering Agency. Connect with us.">
    <link href="./style.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080808'/><path d='M30 30L50 70L70 30' stroke='%2300FFFF' stroke-width='4' fill='none'/></svg>">
</head>

<body class="bg-brand-black min-h-screen flex flex-col items-center justify-between p-8">
    <!-- Subtle Scanning Line Effect -->
    <div class="v-scan-line"></div>

    <!-- Header Section -->
    <header class="w-full max-w-md flex flex-col items-center mt-12 mb-16 animate-in fade-in duration-1000">
        <!-- Vektora SVG Logo -->
        <div class="mb-8">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="0.5" y="0.5" width="99" height="99" stroke="#1F1F1F" stroke-width="1" />
                <path d="M30 35L50 65L70 35" stroke="#00FFFF" stroke-width="1.5" stroke-linecap="square" />
                <path d="M20 20H80M20 80H80" stroke="#1F1F1F" stroke-width="0.5" />
            </svg>
        </div>

        <h1 class="font-mono text-4xl font-bold tracking-[0.3em] text-white uppercase mb-2">VEKTORA</h1>
        <p class="font-mono text-[0.65rem] text-brand-grey tracking-[0.4em] uppercase">
            [ SOFTWARE ENGINEERING AGENCY ]
        </p>
    </header>

    <!-- Links Section (The Grid) -->
    <main class="w-full max-w-md flex-grow flex flex-col gap-4 animate-in slide-in-from-bottom-4 duration-700">
        <!-- INQUIRY BY EMAIL -->
        <a href="mailto:vektora.systems@gmail.com" class="group btn-v-grid">
            <span class="flex items-center gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-mail">
                    <rect width="20" height="16" x="2" y="4" rx="0" />
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
                INQUIRY_BY_EMAIL
            </span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-chevron-right">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </a>

        <!-- VIEW PORTFOLIO GITHUB -->
        <a href="https://github.com/kirabian" target="_blank" class="btn-v-grid">
            <span class="flex items-center gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-github">
                    <path
                        d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                    <path d="M9 18c-4.51 2-5-2-7-2" />
                </svg>
                VIEW_PORTFOLIO_GITHUB
            </span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-chevron-right">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </a>

        <!-- INSTAGRAM OFFICIAL -->
        <a href="https://instagram.com/vektora.systems" target="_blank" class="btn-v-grid">
            <span class="flex items-center gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-instagram">
                    <rect width="20" height="20" x="2" y="2" rx="0" ry="0" />
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                    <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                </svg>
                INSTAGRAM_OFFICIAL
            </span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-chevron-right">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </a>
    </main>

    <!-- Footer Section -->
    <footer
        class="w-full max-w-md flex flex-col items-center mt-16 mb-8 text-[0.6rem] font-mono text-brand-grey tracking-widest gap-2">
        <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-green-500 block animate-pulse"></span>
            LATENCY: 12ms
        </div>
        <p class="text-center">© 2026 VEKTORA SYSTEMS. ALL RIGHTS RESERVED.</p>
    </footer>

</body>

</html>
